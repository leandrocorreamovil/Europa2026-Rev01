<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Europa 2026</title>
<style>
:root{--bg:#0a0a0f;--s1:#13131a;--s2:#1c1c26;--s3:#252530;--s4:#2e2e3d;
--acc:#f59e0b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;
--text:#f0f0f5;--t2:#9090a8;--t3:#55556a;
--r:14px;--rs:8px;--rx:20px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;}
/* SCROLLBAR */
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px;}
/* HEADER */
.hdr{background:linear-gradient(135deg,#0d1b3e,#0a1628,#150d2e);padding:14px 18px 12px;position:sticky;top:0;z-index:300;border-bottom:1px solid #ffffff08;backdrop-filter:blur(10px);}
.hdr-in{display:flex;align-items:center;gap:11px;}
.hdr-t{font-weight:800;font-size:17px;letter-spacing:.2px;}
.hdr-s{font-size:11px;color:var(--t2);margin-top:1px;}
.hdr-c{margin-left:auto;text-align:right;}
.hdr-n{font-size:26px;font-weight:900;color:var(--acc);line-height:1;}
.hdr-l{font-size:10px;color:var(--t2);}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0d0d14;border-top:1px solid #ffffff10;display:flex;z-index:300;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;background:none;border:none;padding:10px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nb-i{font-size:18px;line-height:1;}
.nb-l{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
.nb-d{width:4px;height:4px;border-radius:50%;background:var(--acc);margin-top:1px;}
/* CONTENT */
.pg{padding-bottom:80px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* HERO */
.hero{background:linear-gradient(160deg,#0d1b3e 0%,#0a0a1a 50%,#1a0d30 100%);padding:28px 20px 26px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,#f59e0b18,transparent 65%);pointer-events:none;}
.hero::after{content:'';position:absolute;bottom:-40px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,#3b82f618,transparent 65%);pointer-events:none;}
.hero-num{font-size:72px;font-weight:900;background:linear-gradient(135deg,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;position:relative;}
.hero-lbl{font-size:14px;color:var(--t2);margin-top:6px;}
.hero-sub{font-size:12px;color:var(--t3);margin-top:4px;}
.hero-prog{background:var(--s2);border-radius:4px;height:5px;margin:16px 0 0;overflow:hidden;}
.hero-prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),#f97316);border-radius:4px;transition:width .5s ease;}
.hero-dates{display:flex;justify-content:space-between;margin-top:5px;}
.hero-date{font-size:10px;color:var(--t3);}
/* SECTION TITLES */
.stitle{padding:18px 16px 8px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1.8px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--s3);}
/* CITY GRID */
.cgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 16px;}
.ccard{background:var(--s1);border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--s3);transition:all .15s;position:relative;overflow:hidden;}
.ccard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.ccard:active{transform:scale(.97);background:var(--s2);}
.ccard-ic{font-size:22px;flex-shrink:0;}
.ccard-info{min-width:0;}
.ccard-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ccard-days{font-size:10px;color:var(--t2);margin-top:1px;}
/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;}
.scard{background:var(--s1);border-radius:var(--r);padding:14px 8px;text-align:center;border:1px solid var(--s3);}
.scard-i{font-size:22px;}
.scard-n{font-size:21px;font-weight:900;color:var(--acc);margin-top:2px;}
.scard-l{font-size:10px;color:var(--t2);margin-top:2px;}
/* CONFIRMED */
.clist{padding:0 16px;display:flex;flex-direction:column;gap:6px;}
.citem{background:var(--s1);border-radius:var(--rs);padding:11px 14px;display:flex;gap:10px;align-items:flex-start;border-left:3px solid var(--green);}
.citem-ic{font-size:15px;flex-shrink:0;margin-top:1px;}
.citem-body{flex:1;}
.citem-t{font-size:12px;font-weight:600;line-height:1.3;}
.citem-m{font-size:11px;color:var(--t2);margin-top:2px;}
/* ITINERARY */
.ilist{padding:0 16px;}
.dcard{background:var(--s1);border-radius:var(--r);padding:13px 15px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:11px;border:1px solid var(--s3);transition:all .15s;position:relative;overflow:hidden;}
.dcard::after{content:'›';position:absolute;right:14px;color:var(--t3);font-size:18px;}
.dcard:active{transform:scale(.98);background:var(--s2);}
.dbadge{border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0;}
.dinfo{flex:1;min-width:0;padding-right:16px;}
.dtitle{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dmeta{font-size:11px;color:var(--t2);margin-top:2px;}
/* DAY DETAIL */
.dh{position:relative;height:190px;overflow:hidden;background:#111;}
.dh img{width:100%;height:100%;object-fit:cover;opacity:.65;}
.dh-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,15,.9) 0%,rgba(5,5,15,.1) 55%,transparent 100%);}
.back{position:absolute;top:13px;left:13px;background:rgba(0,0,0,.55);border:1px solid #ffffff20;color:#fff;border-radius:50px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600;backdrop-filter:blur(6px);z-index:2;}
.dh-info{position:absolute;bottom:14px;left:16px;right:16px;z-index:2;}
.dh-title{font-size:19px;font-weight:900;color:#fff;line-height:1.2;}
.dh-date{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px;}
.dh-hotel{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;}
/* EVENTS */
.evlist{padding:10px 16px;}
.evcard{background:var(--s1);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;border:1px solid var(--s3);}
.evcard.alert{border-left:3px solid var(--red);}
.evcard.conf{border-left:3px solid var(--green);}
.evcard.ticket{border-left:3px solid var(--acc);}
.ev-top{display:flex;gap:10px;align-items:flex-start;}
.ev-ic{font-size:21px;flex-shrink:0;line-height:1.1;}
.ev-bd{flex:1;min-width:0;}
.ev-tr{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.ev-title{font-weight:700;font-size:13px;line-height:1.3;}
.ev-time{background:#3b82f615;color:var(--blue);font-size:11px;padding:3px 9px;border-radius:50px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.ev-det{font-size:12px;color:var(--t2);margin-top:5px;line-height:1.5;}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.tag{font-size:10px;padding:3px 9px;border-radius:50px;font-weight:700;}
.tc{background:#10b98118;color:var(--green);}
.ta{background:#ef444418;color:var(--red);}
.tk{background:#f59e0b18;color:var(--acc);}
.tb{background:#3b82f618;color:var(--blue);}
.tg{background:#8b5cf618;color:var(--purple);}
/* TICKET BOX */
.tbox{background:linear-gradient(135deg,#1a1200,#0d1a0d);border:1px solid #f59e0b35;border-radius:var(--r);padding:13px 14px;margin-top:8px;position:relative;overflow:hidden;}
.tbox::before{content:'🎫';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.15;}
.tbox-lbl{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.tbox-row{display:flex;gap:6px;align-items:center;margin-bottom:3px;}
.tbox-row:last-child{margin-bottom:0;}
.tbox-ic{font-size:13px;}
.tbox-val{font-size:13px;font-weight:700;color:var(--text);}
.tbox-sub{font-size:11px;color:var(--t2);}
/* HOTELS */
.hlist{padding:0 16px;}
.hcard{background:var(--s1);border-radius:var(--r);padding:16px;margin-bottom:8px;border:1px solid var(--s3);}
.hcard-name{font-weight:800;font-size:15px;}
.hcard-city{font-size:12px;color:var(--acc);font-weight:700;margin-top:4px;}
.hcard-days{display:inline-block;background:var(--s3);border-radius:50px;padding:3px 11px;font-size:11px;color:var(--t2);margin-top:5px;}
.hcard-addr{font-size:12px;color:var(--t2);margin-top:7px;line-height:1.6;}
.hcard-addr a{color:var(--blue);text-decoration:none;}
/* COSTS */
.coslist{padding:0 16px;}
.cosrow{background:var(--s1);border-radius:var(--rs);padding:12px 15px;margin-bottom:6px;display:flex;align-items:center;gap:10px;border:1px solid var(--s3);}
.cos-inf{flex:1;}
.cos-city{font-weight:700;font-size:13px;}
.cos-days{font-size:11px;color:var(--t2);}
.cos-b{background:#10b98112;color:var(--green);padding:5px 13px;border-radius:50px;font-weight:800;font-size:13px;border:1px solid #10b98125;}
.cos-total{background:linear-gradient(135deg,#0d1b3e,#1a0d30);border-radius:var(--r);padding:16px;margin:8px 16px;display:flex;justify-content:space-between;align-items:center;border:1px solid #3b82f625;}
.tklist{padding:0 16px;}
.tkrow{background:var(--s1);border-radius:var(--rs);padding:12px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;border:1px solid var(--s3);}
.tk-inf{flex:1;}
.tk-name{font-weight:600;font-size:12px;line-height:1.3;}
.tk-url{font-size:11px;color:var(--blue);margin-top:2px;}
.tk-price{color:var(--red);font-weight:800;font-size:13px;white-space:nowrap;}
.infobox{background:#f59e0b0c;border:1px solid #f59e0b20;border-radius:var(--rs);padding:12px 14px;margin:0 16px 12px;font-size:12px;color:#f59e0b88;line-height:1.5;}
/* FRASES */
.lwrap{display:flex;gap:8px;padding:0 16px 12px;}
.lbtn{flex:1;padding:11px;border-radius:var(--r);border:2px solid var(--s3);background:var(--s1);font-weight:700;font-size:13px;cursor:pointer;color:var(--text);transition:all .2s;}
.tipbox{background:#3b82f60c;border:1px solid #3b82f620;border-radius:var(--rs);padding:11px 14px;margin:0 16px 12px;font-size:12px;color:#3b82f688;line-height:1.5;}
.catwrap{padding:0 16px;margin-bottom:8px;}
.catbtn{width:100%;border:none;border-radius:var(--r);padding:13px 16px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;color:#fff;transition:all .15s;}
.catbtn.open{border-radius:var(--r) var(--r) 0 0;}
.phlist{background:var(--s2);border-radius:0 0 var(--r) var(--r);border:1px solid var(--s3);border-top:none;overflow:hidden;}
.phitem{padding:12px 16px;border-bottom:1px solid var(--s3);cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;transition:background .1s;}
.phitem:last-child{border-bottom:none;}
.phitem:active{background:var(--s3);}
.ph-es{font-size:11px;color:var(--t3);}
.ph-tr{font-size:14px;font-weight:700;margin-top:2px;}
.ph-pr{font-size:11px;font-style:italic;margin-top:2px;}
.numwrap{background:var(--s1);border-radius:var(--r);padding:16px;margin:0 16px 16px;border:1px solid var(--s3);}
.numgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px;}
.numcell{background:var(--s2);border-radius:var(--rs);padding:8px 4px;text-align:center;border:1px solid var(--s3);}
.num-n{font-weight:900;font-size:17px;}
.num-w{font-size:10px;color:var(--t2);margin-top:1px;}
/* ALERTS */
.alist{padding:0 16px;}
.acard{background:var(--s1);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;border:1px solid var(--s3);border-left:3px solid var(--red);}
.acard-day{font-size:10px;color:var(--red);font-weight:700;letter-spacing:.5px;margin-bottom:3px;}
.acard-title{font-weight:700;font-size:13px;}
.acard-det{font-size:12px;color:var(--t2);margin-top:4px;line-height:1.4;}
.acard-time{font-size:11px;color:var(--blue);margin-top:4px;font-weight:600;}
.acard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.dis-btn{background:var(--s3);border:1px solid var(--s4);color:var(--t2);border-radius:50px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:700;flex-shrink:0;}
.empty{text-align:center;padding:48px 20px;color:var(--t3);}
.pwatip{background:var(--s2);border-radius:var(--r);padding:14px;margin:8px 16px 0;font-size:12px;color:var(--t2);line-height:1.5;border:1px solid var(--s3);}
</style>
</head>

function init(){updateHeader();renderNav();render();setInterval(updateHeader,60000);}
function updateHeader(){
  const now=new Date(), diff=Math.ceil((TRIP-now)/86400000);
  const n=document.getElementById("hnum"), l=document.getElementById("hlbl");
  if(!n)return;
  if(diff>0){n.textContent=diff;l.textContent="días para el viaje";}
  else if(diff>-22){n.textContent="Día "+(Math.abs(diff));n.style.color="var(--green)";l.textContent="¡Estás viajando!";}
  else{n.textContent="✓";l.textContent="Viaje finalizado";}
}
function goTab(t){curTab=t;selDay=null;openCat=null;render();window.scrollTo(0,0);}
function openDay(n){selDay=IT.find(d=>d.day===n);render();window.scrollTo(0,0);}
function openCity(c){curTab="itin";selDay=null;openCat=null;render();
  setTimeout(()=>{const el=document.getElementById("day-"+CFIRST[c]);if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},100);}
function dismiss(id){dismissed.push(id);saveDis();render();}
function copyPhrase(id,txt){
  navigator.clipboard?.writeText(txt).catch(()=>{});
  const el=document.getElementById("cp-"+id);
  if(el){el.textContent="✅";setTimeout(()=>{if(el)el.textContent="📋";},1500);}
}
function toggleCat(i){openCat=openCat===i?null:i;render();}
function switchLang(l){curLang=l;openCat=null;render();}

  const pg=document.getElementById("pg");
  if(curTab==="inicio") pg.innerHTML=renderInicio();

  else if(curTab==="costos") pg.innerHTML=renderCostos();
  else if(curTab==="frases") pg.innerHTML=renderFrases();
  else if(curTab==="alertas") pg.innerHTML=renderAlertas();
}

function renderDetail(){
  const d=selDay, col=CC[d.city]||"#555";
  const evs=d.events.map(ev=>{
    const isAlert=ev.alert, isTicket=!!ev.ticket;
    const cls=isTicket?"evcard ticket":isAlert?"evcard alert":"evcard";
    const tbox=isTicket?`<div class="tbox">
      <div class="tbox-lbl">🎫 Billete / Reserva</div>
      <div class="tbox-row"><span class="tbox-ic">📅</span><span class="tbox-val">${ev.ticket.fecha}</span></div>
      <div class="tbox-row"><span class="tbox-ic">⏰</span><span class="tbox-val">${ev.ticket.hora}</span></div>
      <div class="tbox-row"><span class="tbox-ic">ℹ️</span><span class="tbox-sub">${ev.ticket.detalle}</span></div>
    </div>`:"";
    const tags=[];
    if(ev.cost&&ev.cost!=="Gratis"&&ev.cost!=="Incluido")tags.push(`<span class="tag tc">💶 ${ev.cost}</span>`);
    if(ev.cost==="Gratis")tags.push(`<span class="tag tg">✓ Gratis</span>`);
    if(ev.cost==="Incluido")tags.push(`<span class="tag tb">✓ Incluido</span>`);
    if(isAlert)tags.push(`<span class="tag ta">⚠️ Reservar online</span>`);
    if(isTicket)tags.push(`<span class="tag tk">🎫 Ticket con fecha/hora</span>`);
    return `<div class="${cls}">
      <div class="ev-top">
        <span class="ev-ic">${ev.ic}</span>
        <div class="ev-bd">
          <div class="ev-tr">
            <span class="ev-title">${ev.t}</span>
            ${ev.time?`<span class="ev-time">${ev.time}</span>`:""}
          </div>
          <div class="ev-det">${ev.d}</div>
          ${tags.length?`<div class="tags">${tags.join("")}</div>`:""}
          ${tbox}
        </div>
      </div>
    </div>`;
  }).join("");

  return `
    <div class="dh">
      <img src="${IMGS[d.city]||''}" onerror="this.style.display='none'" alt="">
      <div class="dh-ov"></div>
      <button class="back" onclick="selDay=null;render()">← Volver</button>

        <div class="dh-title">${d.label}</div>
        <div class="dh-date">${d.date}</div>
        ${d.hotel?`<div class="dh-hotel">🏨 ${d.hotel}</div>`:""}
      </div>
    </div>
    <div class="evlist">${evs}</div>`;
}

      </button>
      ${openCat===ci?`<div class="phlist">
        ${cat.items.map((it,ii)=>`
          <div class="phitem" onclick="copyPhrase('${ci}-${ii}','${it.tr.replace(/'/g,"\\'")}')">
            <div>
              <div class="ph-es">${it.es}</div>
              <div class="ph-tr">${it.tr}</div>
              <div class="ph-pr" style="color:${data.color}">/${it.pr}/</div>
            </div>
            <span id="cp-${ci}-${ii}" style="font-size:15px;color:var(--t3)">📋</span>
          </div>`).join("")}
      </div>`:""}
    </div>`).join("");

  const nums=data.nums.map(([n,w])=>`
    <div class="numcell">
      <div class="num-n" style="color:${data.color}">${n}</div>
      <div class="num-w">${w}</div>
    </div>`).join("");

  return `<div style="padding:0 16px">
    <div class="stitle" style="padding-left:0">💬 Frases útiles</div>
    <div class="lwrap" style="padding-left:0;padding-right:0">${lbtns}</div>
    <div class="tipbox">💡 Tocá una frase para copiarla al portapapeles. La pronunciación está en <em>cursiva</em>.</div>
    ${cats}
    <div class="numwrap">
      <div style="font-weight:700;font-size:13px;color:${data.color}">🔢 Números útiles</div>
      <div class="numgrid">${nums}</div>
    </div>
  </div>`;
}

function renderAlertas(){
  const alerts=[];
  IT.forEach(d=>d.events.forEach((ev,i)=>{
    if(ev.alert)alerts.push({id:`${d.day}-${i}`,day:d.day,date:d.date,ev});
  }));
  const active=alerts.filter(a=>!dismissed.includes(a.id));
  if(!active.length) return `
    <div style="padding:0 16px">
      <div class="stitle" style="padding-left:0">🔔 Alertas</div>
      <div class="empty"><div style="font-size:48px">✅</div><div style="margin-top:12px;font-size:14px">¡Todas las alertas revisadas!</div></div>
      <div class="pwatip">💡 Para instalar la app en Android: Chrome → ⋮ → "Agregar a pantalla de inicio".</div>
    </div>`;
  return `<div style="padding:0 16px">
    <div class="stitle" style="padding-left:0">🔔 Alertas y recordatorios</div>
    <div class="alist" style="padding:0">
      ${active.map(a=>`
        <div class="acard">
          <div class="acard-top">
            <div style="flex:1">
              <div class="acard-day">DÍA ${a.day} · ${a.date}</div>
              <div class="acard-title">${a.ev.ic} ${a.ev.t}</div>
              <div class="acard-det">${a.ev.d}</div>
              ${a.ev.time?`<div class="acard-time">⏰ ${a.ev.time} h</div>`:""}
            </div>
            <button class="dis-btn" onclick="dismiss('${a.id}')">✓ OK</button>
          </div>
        </div>`).join("")}
    </div>
    <div class="pwatip">💡 Para instalar la app en Android: Chrome → ⋮ → "Agregar a pantalla de inicio".</div>
  </div>`;
}

document.addEventListener("DOMContentLoaded",()=>{
  document.querySelectorAll(".ccard").forEach(el=>{
    el.style.borderLeftColor=el.style.getPropertyValue("--c")||"#555";
  });
});
init();
</script>
